kind = "web"
previewPath = "/"
title = "Fin-help"
version = "1.0.0"
id = "artifacts/fin-help"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21835

[services.development]
run = "pnpm --filter @workspace/fin-help run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/fin-help", "run", "build" ]
publicDir = "artifacts/fin-help/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21835"
BASE_PATH = "/"
